# Chapter 2 — Concept: Numbering
id: concept-numbering
title: "CONCEPT: Numbering"
narration: |
  Every document in FORGE gets a **smart number** so you can trace its lineage
  at a glance.

  ```
   WO-0001-0000     EST-0001-0000     INV-0001-0000
   ─────────────    ──────────────    ──────────────
   │ WO prefix │    │ EST prefix │    │ INV prefix │
   │ Job #     │    │ Job #      │    │ Job #      │
   │ Seq #     │    │ Seq #      │    │ Seq #      │
   └────────────    └─────────────    └─────────────
  ```

  **The Work Order owns the number.** When you create an estimate or invoice
  *from* a WO, it inherits the WO's job number. The last four digits are the
  document's own sequence within that job.

  - `WO-0001-0001` — first WO in job 1
  - `EST-0001-0001` — first estimate under WO job 1
  - `INV-0001-0001` — first invoice under WO job 1

  **Loose estimates** (no WO attached yet) render as `EST-????-????` until they
  are linked to a work order. The question marks are a visual cue: "this quote
  hasn't been assigned to a job yet."
