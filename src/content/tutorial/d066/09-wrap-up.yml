# Chapter 9 — Wrap-Up & Knowledge Check
id: wrap-up
title: "Wrap-Up: What You've Learned"
narration: |
  You made it! Here's what you've accomplished:

  ✅ Created a **Customer**
  ✅ Created a **Work Order** under that customer
  ✅ Created an **Estimate** against the WO
  ✅ Converted the estimate into an **Invoice**
  ✅ Recorded a **Payment** and closed the invoice
  ✅ Created a **Loose Estimate** as a quick quote

  That's the full FORGE lifecycle — from lead to paid invoice. You now know
  enough to run real transactions.

  **Cleanup Options**

  All the records you created are tagged with a yellow **TUTORIAL** badge. They
  won't appear in your real reports. You have two choices:

  - **Keep everything** — just leave them as-is. They serve as reference
    records and won't interfere with real data.
  - **Delete all tutorial data** — go to **Settings → Manage Tutorial Data**
    and hit **Remove All**. This deletes every record created during this
    tutorial in one click.

  Either way, nothing leaks. Everything stays behind the yellow badge until
  you decide otherwise.

  Now let's test what you remember with a quick quiz.
steps:
  - narration
  - wait_for_action
  - reaction
comprehension_chips:
  - label: "Review the numbering rules"
    action: select_chip
    payload: { query: "show me the numbering scheme again" }
  - label: "Where do I find tutorial cleanup?"
    action: select_chip
    payload: { query: "settings manage tutorial data" }
on_enter: { }
on_action:
  next: { advance: true }
  back: { go_back: true }
quiz:
  questions:
    - id: q1
      text: "True or False — you can create an invoice without first having a work order"
      options:
        - value: true
          label: "True"
        - value: false
          label: "False"
      answer: false
      remediation_chapter: 4
    - id: q2
      text: "What's the canonical order?"
      options:
        - value: a
          label: "Customer → WO → Estimate → Invoice"
        - value: b
          label: "WO → Customer → Invoice → Estimate"
        - value: c
          label: "Estimate → Invoice → WO → Customer"
      answer: a
      remediation_chapter: 1
    - id: q3
      text: "If WO-0001-0014 is the parent WO, what's the invoice number?"
      options:
        - value: a
          label: "INV-0001-0014"
        - value: b
          label: "INV-2026-014"
        - value: c
          label: "INV-0001-0000"
      answer: a
      remediation_chapter: 2
