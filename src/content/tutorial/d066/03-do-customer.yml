# Chapter 3 — Do: Create a Customer
id: do-customer
title: "DO: Create a Customer"
narration: |
  Let's create your first real record. Look for the **+ Customer** button at the
  top of the customer list and click it.

  A form will slide open. Fill in at least the customer's **name** and **phone
  number** (email is optional for now). Hit **Save** when you're done.

  Once you save, you'll see the customer card appear in the list with a small
  yellow **TUTORIAL** badge next to it. That badge tells FORGE — and you — that
  this record was created during onboarding. It won't appear in reports, won't
  trigger any real email notifications, and you can bulk-delete all tutorial
  records at the end.

  Go ahead — click **+ Customer** and save one now.
steps:
  - narration
  - wait_for_action
  - reaction
comprehension_chips:
