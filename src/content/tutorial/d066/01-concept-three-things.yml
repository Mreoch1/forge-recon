# Chapter 1 — Concept: The Three Things
id: concept-three-things
title: "CONCEPT: The Three Things"
narration: |
  FORGE is built on **three immutable rules** that keep your bookkeeping clean.
  Think of them as guardrails — once you internalise them, everything else clicks into place.

  ```
  ┌─────────────────────────────────────────────────────┐
  │                                                     │
  │   Work Order ──────▶ Estimate ──────▶ Invoice      │
  │      (standalone)        (needs WO       (needs    │
  │        OK)               or not)         Estimate) │
  │                                                     │
  └─────────────────────────────────────────────────────┘
  ```

  **Rule 1 — Estimates can exist with or without a Work Order.**
  You can write a loose quote for a prospect who hasn't committed yet. No WO
  required. When they say "go", you attach the estimate to a WO later.

  **Rule 2 — Invoices must come from an Estimate.**
  No orphan billing. Every invoice references a parent estimate so you always
  know *what* you're charging for and *why* the amount matches (or differs from)
  the quote. This prevents surprise invoices.

  **Rule 3 — Work Orders can stand alone.**
  Time-&-materials jobs, recurring service calls, retainers — create a WO first,
  track labour and materials, then bill against it later with an estimate +
  invoice.
