# Chapter 4 — Do: Create a Work Order
id: do-work-order
title: "DO IT: Create a Work Order"
narration: |
  Find the customer you just created and click into their detail view. Look for
  the **+ Work Order** button in the top toolbar — it's the clipboard icon with a
  plus sign — and click it.

  A new work order form opens. Notice FORGE has already auto-assigned a number
  like `WO-0001-0000`. The WO number is the anchor for everything that follows:
  estimates, invoices, and even purchase orders will trace back to this number.

  For the **Description** field enter:

  ```
  Demo job: drywall repair, kitchen wall
  ```

  Leave the default status as **Open** and hit **Save**.

  Once saved you'll land on the **Work Order Detail** page. Take a moment to
  explore its tabbed layout:

  - **Details** — the WO's core info (number, status, description, dates)
  - **Estimates** — where you'll add quotes against this work order
  - **Invoices** — where billable amounts get finalized
  - **History** — an audit trail of every change

  Click back into the customer record and you'll see the new WO listed under
  their **Work Orders** section. Each WO lives under a customer.
steps:
  - narration
  - wait_for_action
  - reaction
comprehension_chips:
