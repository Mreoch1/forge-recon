# Chapter 7 — Do: Record a Payment
id: do-payment
title: "DO IT: Record a Payment"
narration: |
  Your invoice is sitting at **OPEN** status and the customer is ready to pay.
  Let's record their payment and close it out.

  From the Invoice Detail page, click the **Record Payment** button in the top
  toolbar — it's the dollar-bill icon. A payment form opens.

  FORGE pre-fills most of the details for you:

  1. **Amount** — enter the invoice total (e.g. **$386.90**). You can record a
     partial payment, but for this tutorial use the full amount.
  2. **Date** — set it to today's date. This is when the money was received.
  3. **Method** — pick **Check** or **Credit Card** from the dropdown (doesn't
     matter which for training data).

  Click **Save Payment**. Watch what happens:

  - The invoice badge instantly flips from **OPEN** → **PAID**. That yellow badge
    changes to green — your first satisfaction hit.
  - A **Payment Ledger** link appears on the invoice. This is an audit trail
    showing every payment recorded against this invoice, including who recorded
    it and when.

  That's it. Three clicks and you've gone from "we sent a bill" to "money in
  the bank." In FORGE, payment recording is always available on any OPEN
  invoice, and multiple partial payments are supported if the customer pays in
  installments.
steps:
  - narration
  - wait_for_action
  - reaction
