# Chapter 5 — Do: Create an Estimate
id: do-estimate
title: "DO IT: Create an Estimate"
narration: |
  From the Work Order Detail page, click the **Estimates** tab. You'll see an
  empty list with a **+ New Estimate** button. Click it.

  A blank estimate form opens. Let's add two line items:

  | Line Item       | Type      | Rate  | Qty | Total  |
  |-----------------|-----------|-------|-----|--------|
  | Drywall labor   | Labor     | $80   | 4hr | $320   |
  | Drywall sheets  | Materials | $45   | 1   | $45    |

  FORGE will calculate a subtotal of **$365.00**. Now set the **Tax Rate** to
  **6%** — that adds **$21.90** in tax, bringing the grand total to **$386.90**.

  Click **Save**. The estimate now appears in the list with a number like
  `EST-0001-0001`.

  Notice the numbering pattern: `EST` prefix for estimate, the same job number
  as the WO (`0001`), and a sequence number (`0001`) that starts at 1 for the
  first estimate under this job. If you create a second estimate it would be
  `EST-0001-0002`.
steps:
  - narration
  - wait_for_action
  - reaction
comprehension_chips:
  - label: "Can I change the estimate after saving?"
    action: select_chip
    payload: { query: "edit saved estimate" }
  - label: "What happens if I leave tax at 0%?"
    action: select_chip
    payload: { query: "zero tax consequences" }
